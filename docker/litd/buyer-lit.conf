# PolicyPulse — litd config for buyer node (regtest)

# --- litd ---
httpslisten=0.0.0.0:8443
uipassword=policypulse123
lnd-mode=integrated
network=regtest
autopilot.disable=true

# --- lnd ---
lnd.noseedbackup=true
lnd.debuglevel=info
lnd.rpclisten=0.0.0.0:10009
lnd.restlisten=0.0.0.0:8080
lnd.tlsextradomain=litd-buyer
lnd.tlsextraip=0.0.0.0

# --- bitcoin ---
lnd.bitcoin.node=bitcoind

# --- bitcoind connection ---
lnd.bitcoind.rpchost=bitcoind:18443
lnd.bitcoind.rpcuser=policypulse
lnd.bitcoind.rpcpass=policypulse
lnd.bitcoind.zmqpubrawblock=tcp://bitcoind:28332
lnd.bitcoind.zmqpubrawtx=tcp://bitcoind:28333
